<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Gifts</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background: #000; color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 393px; }
                
        .tiktok-logo { width: 72px; height: 72px; display: block; margin: 20px auto; }
        input { width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; background: #111; border: 1px solid #333; color: #fff; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; background: #fe2c55; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: transform 0.2s; }
        button:active { transform: scale(0.96); }
                
        /* Estilos para enlaces de redes sociales */
        .social-separator { display: flex; align-items: center; text-align: center; margin: 20px 0; color: #666; font-size: 14px; }
        .social-separator::before, .social-separator::after { content: ''; flex: 1; border-bottom: 1px solid #333; }
        .social-separator:not(:empty)::before { margin-right: .5em; }
        .social-separator:not(:empty)::after { margin-left: .5em; }
                
        .social-link { display: flex; align-items: center; justify-content: center; width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #111; color: #fff; font-size: 15px; font-weight: 600; text-decoration: none; box-sizing: border-box; transition: background 0.2s; }
        .social-link:hover { background: #1a1a1a; }
        .social-link img { width: 20px; height: 20px; margin-right: 12px; }

        #profile-display { background: #111; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; display: none; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #fe2c55; margin-bottom: 10px; }
                
        .gift-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; height: 300px; overflow-y: auto; background: #111; padding: 10px; border-radius: 12px; }
        .gift-item { border: 1px solid #333; border-radius: 8px; padding: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; }
        .gift-item img { width: 100%; }
        .selected { border: 2px solid #fff; }
        .gift-price { position: absolute; bottom: 2px; right: 2px; background: rgba(0,0,0,0.7); color: #fff; font-size: 10px; padding: 2px 4px; border-radius: 4px; font-weight: bold; }
        
        .card-option { background: #1a1a1a; padding: 15px; margin: 10px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; cursor: pointer; }
        .card-option.active { border: 2px solid #fff; }
                
        /* Carga y Alerta */
        #loader-img { width: 72px; height: 72px; animation: spin 1.5s linear infinite; display: block; margin: 40px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        #super-alerta { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; 
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; 
        }
        .icon-regalo { width: 100px; height: 100px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>

            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            giftsData.forEach(item => {
                grid.innerHTML += `<div class="gift-item" onclick="seleccionar(this)">
                    <img src="${item.url}" width="100%">
                    <span class="gift-price">$${item.price}</span>
                </div>`;
            });
        }
    }

    function seleccionar(el) {
        document.querySelectorAll('.gift-item').forEach(item => item.classList.remove('selected'));
        el.classList.add('selected');
    }

    function seleccionarCard(el) {
        document.querySelectorAll('.card-option').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    }

    function iniciarCarga() {
        // Corrección de visualización: Oculta catálogo y avatar por completo
        document.getElementById('step2').style.display = 'none';
        document.getElementById('profile-display').style.display = 'none';
        
        // Muestra el loader correctamente en pantalla
        document.getElementById('loader').style.display = 'block';
        
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('super-alerta').style.display = 'flex';
        }, 3000);
    }

    function reiniciarApp() {
        document.getElementById('super-alerta').style.display = 'none';
        location.reload();
    }
</script>
</body>
</html>
