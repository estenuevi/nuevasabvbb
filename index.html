<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Gifts Premium Edition</title>
    <style>
        /* ==========================================
           1. RESET GENERAL Y VARIABLES DE DISEÑO
           ========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

       :root {
            --bg-main: #000;
            --bg-card: #000;
            --bg-card-hover: #1a1a1e;
            --tiktok-red: #fe2c55;
            --tiktok-cyan: #25f4ee;
            --gold-premium: #ffd700;
            --gold-dark: #b8860b;
            --border-red: rgba(254, 44, 85, 0.6);
            --glow-red: rgba(254, 44, 85, 0.4);
            --shadow-3d: 0 10px 25px rgba(0, 0, 0, 0.7), inset 0 2px 4px rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-main);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 10px;
            overflow-x: hidden;
        }

        /* Contenedor Principal Estilo Smartphone */
        .container {
            width: 100%;
            max-width: 410px;
            background: #0d0d0f;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #222226;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 1;
        }

        /* ==========================================
           2. COMPONENTES DE INTERFAZ ESTÁNDAR
           ========================================== */
        .tiktok-logo {
            width: 76px;
            height: 76px;
            display: block;
            margin: 10px auto 20px auto;
            filter: drop-shadow(0 0 10px rgba(37, 244, 238, 0.3));
            animation: floatingLogo 3s infinite ease-in-out;
        }

        @keyframes floatingLogo {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(3deg); }
        }

        h1.app-title {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(45deg, #fe2c55, #25f4ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input.custom-input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 14px;
            background: #16161a;
            border: 1px solid #2d2d34;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        input.custom-input:focus {
            outline: none;
            border-color: var(--tiktok-red);
            background: #1c1c22;
            box-shadow: 0 0 12px rgba(254, 44, 85, 0.2), inset 0 2px 4px rgba(0,0,0,0.5);
        }

        button.btn-pro {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #fe2c55 0%, #bd1939 100%);
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(254, 44, 85, 0.3);
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        button.btn-pro:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(254, 44, 85, 0.5);
        }

        button.btn-pro:active {
            transform: translateY(1px) scale(0.98);
        }

        /* Separadores y Redes */
        .social-separator {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0 15px 0;
            color: #555562;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .social-separator::before, .social-separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #222226;
        }
        .social-separator:not(:empty)::before { margin-right: 1em; }
        .social-separator:not(:empty)::after { margin-left: 1em; }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 14px;
            border: 1px solid #222226;
            background: #000;
            color: #d1d1d6;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            touch-action: manipulation; 
        }
        .social-link:hover {
            background: #111113;
            border-color: #3a3a44;
            color: #fff;
        }
        .social-link img {
            width: 22px;
            height: 22px;
            margin-right: 12px;
        }

        /* Perfil de Usuario */
        #profile-display {
            background: linear-gradient(180deg, #16161a 0%, #111113 100%);
            padding: 20px;
            border-radius: 18px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #222226;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }
        .avatar-wrapper {
            position: relative;
            width: 86px;
            height: 86px;
            margin: 0 auto 12px auto;
        }
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--tiktok-red);
            object-fit: cover;
        }
        .avatar-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #00e676;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 3px solid #16161a;
        }

        /* ==========================================
           3. SISTEMA DE CATÁLOGO 3D AVANZADO
           ========================================== */
        .section-label {
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .gift-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(75px, 1fr));
            gap: 8px;
            height: 320px;
            overflow-y: auto;
            background: #08080a;
            padding: 10px;
            border-radius: 16px;
            border: 1px solid #1c1c22;
            perspective: 1200px;
            margin-bottom: 20px;
            -webkit-overflow-scrolling: touch; 
        }

        .gift-grid::-webkit-scrollbar { width: 4px; }
        .gift-grid::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .gift-grid::-webkit-scrollbar-thumb { background: #2d2d34; border-radius: 10px; }

        .gift-item {
            position: relative;
            height: 85px;
            background: linear-gradient(135deg, #1a080c 0%, #0f0406 100%);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transform-style: preserve-3d;
            border: 2px solid var(--border-red);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(254, 44, 85, 0.2);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), border-color 0.3s, box-shadow 0.3s;
            touch-action: manipulation;
        }

        .gift-item:hover, .gift-item:active {
            border-color: var(--tiktok-cyan);
            transform: translateY(-4px) translateZ(10px) rotateX(5deg);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6), 0 0 12px rgba(37, 244, 238, 0.3);
        }

        .gift-item::before {
            content: '';
            position: absolute;
            top: 2px; left: 2px; right: 2px; bottom: 2px;
            border: 1px solid rgba(254, 44, 85, 0.2);
            border-radius: 10px;
            pointer-events: none;
            z-index: 1;
        }

        .gift-img-container {
            width: 70%;
            height: 70%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            transform: translateZ(20px);
            pointer-events: none;
            transition: transform 0.3s ease;
        }

        .gift-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .gift-item.selected {
            border-color: var(--gold-premium) !important;
            background: linear-gradient(135deg, #2c1a04 0%, #140b01 100%) !important;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4), inset 0 0 15px rgba(255, 215, 0, 0.2) !important;
            transform: scale(1.05) translateZ(15px) !important;
        }

        .gift-price {
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%) translateZ(25px);
            background: rgba(0, 0, 0, 0.85);
            color: var(--gold-premium);
            font-size: 9px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 6px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            white-space: nowrap;
            z-index: 4;
        }

        .gift-grid.has-selection .gift-item:not(.selected) {
            opacity: 0.35;
            filter: grayscale(0.6);
        }

        /* Métodos de Pago */
        .card-option {
            background: #111113;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #222226;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }
        .card-option:hover {
            background: #16161a;
            border-color: #3a3a44;
        }
        .card-option.active {
            border-color: #fff;
            background: #1c1c22;
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
        }
        .card-option span {
            font-weight: 600;
            font-size: 15px;
        }

        /* ==========================================
           4. MODAL DE ANIMACIÓN PRO (PANTALLA FLOTANTE)
           ========================================== */
        #preview-modal {
            position: fixed;
            top: 0; left: 0; 
            width: 100vw; 
            height: 100vh;
            height: -webkit-fill-available; 
            background: rgba(3, 3, 4, 0.94);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #preview-modal.active {
            display: flex;
            opacity: 1;
        }

        .showcase-container {
            position: relative;
            width: 290px;  
            height: 360px; 
            background: radial-gradient(circle at center, #1f0b10 0%, #0a0204 100%);
            border-radius: 24px;
            border: 3px solid #fe2c55;
            box-shadow: 0 25px 60px rgba(254, 44, 85, 0.35), 0 0 50px rgba(254, 44, 85, 0.15), inset 0 0 40px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            transform: scale(0.8) rotateY(20deg);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        #preview-modal.active .showcase-container {
            transform: scale(1) rotateY(0deg);
        }

        .showcase-container::after {
            content: '';
            position: absolute;
            top: 6px; left: 6px; right: 6px; bottom: 6px;
            border: 1px solid var(--gold-premium);
            border-radius: 22px;
            opacity: 0.5;
            pointer-events: none;
        }

        .showcase-img-box {
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateZ(60px);
            filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.6));
            animation: hyperFloat 3.5s infinite ease-in-out;
        }

        .showcase-img-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @keyframes hyperFloat {
            0%, 100% { transform: translateZ(60px) translateY(0) rotate(0deg); }
            50% { transform: translateZ(90px) translateY(-15px) rotate(5deg); }
        }

        .showcase-title {
            margin-top: 25px;
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            transform: translateZ(40px);
            text-align: center;
        }

        .showcase-price {
            margin-top: 8px;
            font-size: 16px;
            font-weight: 700;
            color: var(--gold-premium);
            background: rgba(255, 215, 0, 0.1);
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            transform: translateZ(30px);
        }

        .btn-close-modal {
            margin-top: 25px;
            padding: 10px 24px;
            border-radius: 12px;
            background: #050507;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255,255,255,0.2);
            transform: translateZ(40px);
            transition: all 0.2s;
        }
        .btn-close-modal:hover {
            transform: translateZ(50px) scale(1.05);
            background: var(--tiktok-cyan);
            color: #000;
        }

        /* ==========================================
           5. CARGA Y PANTALLAS DE SALIDA
           ========================================== */
        #loader-img {
            width: 68px;
            height: 68px;
            animation: proSpin 1.2s linear infinite;
            display: block;
            margin: 40px auto;
        }
        @keyframes proSpin { 100% { transform: rotate(360deg); } }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container" id="main-app">

     let animationFrameId = null;
    let canvas, ctx;
    let particleArray = [];

    // Motor de búsqueda controlado
    function buscarPerfil() {
        const userField = document.getElementById('username');
        const user = userField.value.trim();
        
        if(!user) {
            userField.style.borderColor = "var(--tiktok-red)";
            return;
        }

        document.getElementById('step1-search').style.display = 'none';
        
        // Formateo estricto del visualizador
        const finalName = user.startsWith('@') ? user : '@' + user;
        document.getElementById('display-name').innerText = finalName;
        document.getElementById('avatar-img').src = `https://unavatar.io/tiktok/${user.replace('@','')}`;
        
        document.getElementById('profile-display').style.display = 'block';
        document.getElementById('step2').style.display = 'block';
        
        // Construcción segura del pool de elementos evitando desbordamientos
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        
        giftsData.forEach((item, index) => {
            const cardElement = document.createElement('div');
            cardElement.className = 'gift-item';
            cardElement.setAttribute('onclick', `ejecutarSeleccionPro(this, '${item.url}', ${item.price})`);
            
            cardElement.innerHTML = `
                <div class="gift-img-container">
                    <img src="${item.url}" alt="Gift Element Mini">
                </div>
                <span class="gift-price">$${item.price.toLocaleString()}</span>
            `;
            grid.appendChild(cardElement);
        });
    }

    // INTERCEPTOR DE CLIC: Genera la ventana flotante 3D y el Arco Cinético
    function ejecutarSeleccionPro(elemento, url, precio) {
        const grid = document.getElementById('grid');
        
        // Manejo de clases en la cuadrícula
        document.querySelectorAll('.gift-item').forEach(item => item.classList.remove('selected'));
        elemento.classList.add('selected');
        grid.classList.add('has-selection');

        // Configurar e invocar la Pantalla de Animación Modal Superior
        document.getElementById('modal-gift-img').src = url;
        document.getElementById('modal-gift-price').innerText = `$${precio.toLocaleString()}`;
        
        const modal = document.getElementById('preview-modal');
        modal.classList.add('active');

        // Inicializar el renderizado del arco mágico en el Canvas
        initArcCanvas();
    }

    function cerrarAnimacionPro() {
        const modal = document.getElementById('preview-modal');
        modal.classList.remove('active');
        
        // Apagar el bucle de renderizado del canvas para ahorrar CPU
        if (animationFrameId) {
            cancelAnimationFrame(animationFrameId);
        }
    }

    function seleccionarCard(el) {
        document.querySelectorAll('.card-option').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    }

    function iniciarCarga() {
        document.getElementById('step2').style.display = 'none';
        document.getElementById('profile-display').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('super-alerta').style.display = 'flex';
        }, 3500);
    }

    function reiniciarApp() {
        document.getElementById('super-alerta').style.display = 'none';
        location.reload();
    }

    /* ==========================================
       7. MOTOR DE PARTÍCULAS: ARCO DE LUZ 3D (CANVAS)
       ========================================== */
    function initArcCanvas() {
        canvas = document.getElementById('arc-canvas');
        ctx = canvas.getContext('2d');
        
        // Ajustar resolución del canvas según su contenedor real
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;

        particleArray = [];
        
        // Crear bucle generativo continuo
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        bucleParticulas();
    }

    class SparkleParticle {
        constructor(canvasWidth, canvasHeight) {
            this.canvasWidth = canvasWidth;
            this.canvasHeight = canvasHeight;
            this.reset();
        }

        reset() {
            // Generación matemática sobre una trayectoria de arco elíptico superior
            this.angle = Math.PI + (Math.random() * Math.PI); // Arco de 180 grados superior
            this.radiusX = this.canvasWidth * 0.44;
            this.radiusY = this.canvasHeight * 0.40;
            this.centerX = this.canvasWidth / 2;
            this.centerY = this.canvasHeight / 2 + 30;

            // Coordenadas calculadas en base al arco elíptico
            this.x = this.centerX + Math.cos(this.angle) * this.radiusX;
            this.y = this.centerY + Math.sin(this.angle) * this.radiusY;
            
            this.size = Math.random() * 2.5 + 1;
            this.speed = Math.random() * 0.02 + 0.008;
            this.alpha = 1;
            this.fadeSpeed = Math.random() * 0.015 + 0.005;
            
            // Variación cromática Pro del Arco (Fucsia, Cian y Oro)
            const colors = ['#fe2c55', '#25f4ee', '#ffd700', '#ffffff'];
            this.color = colors[Math.floor(Math.random() * colors.length)];
        }

        update() {
            this.angle += this.speed;
            this.alpha -= this.fadeSpeed;

            // Recalcular física orbital del arco
            this.x = this.centerX + Math.cos(this.angle) * this.radiusX;
            this.y = this.centerY + Math.sin(this.angle) * this.radiusY;

            // Añadir una ligera dispersión orgánica caótica
            this.x += (Math.random() - 0.5) * 4;
            this.y += (Math.random() - 0.5) * 4;

            if (this.alpha <= 0 || this.angle > Math.PI * 2) {
                this.reset();
            }
        }

        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.shadowBlur = 8;
            ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    function bucleParticulas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Densidad controlada de partículas para el arco (60 unidades de procesamiento)
        if (particleArray.length < 60) {
            particleArray.push(new SparkleParticle(canvas.width, canvas.height));
        }

        // Pintado del arco base de energía difuminado de fondo
        ctx.save();
        ctx.beginPath();
        ctx.ellipse(canvas.width / 2, canvas.height / 2 + 30, canvas.width * 0.44, canvas.height * 0.40, 0, Math.PI, Math.PI * 2);
        ctx.strokeStyle = 'rgba(254, 44, 85, 0.15)';
        ctx.lineWidth = 6;
        ctx.stroke();
        ctx.restore();

        // Actualizar y dibujar cada nodo de luz individual
        for (let i = 0; i < particleArray.length; i++) {
            particleArray[i].update();
            particleArray[i].draw();
        }

        animationFrameId = requestAnimationFrame(bucleParticulas);
    }
